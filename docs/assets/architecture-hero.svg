<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 280" role="img" aria-label="Certior gate flow: a tool call from any agent passes through capability, content, and budget gates; allowed calls return a signed receipt, blocked calls raise CertiorBlocked.">
  <rect width="960" height="280" fill="#fff"/>
  <defs>
    <marker id="arr-dark" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#0f172a"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#10b981"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#dc2626"/>
    </marker>
  </defs>

  <!-- Tool call card (left) -->
  <rect x="20" y="100" width="200" height="80" rx="10" fill="#fff" stroke="#0f172a" stroke-width="1.4"/>
  <text x="120" y="125" text-anchor="middle" font-size="10" fill="#64748b" font-family="ui-monospace,monospace" letter-spacing="1.2">TOOL CALL FROM ANY AGENT</text>
  <text x="120" y="148" text-anchor="middle" font-size="14" font-weight="600" fill="#0f172a" font-family="ui-monospace,monospace">web_fetch(url)</text>
  <text x="120" y="166" text-anchor="middle" font-size="10" fill="#64748b" font-family="ui-sans-serif,system-ui">OpenClaw, LangChain, CrewAI</text>

  <!-- arrow 1 -->
  <line x1="225" y1="140" x2="300" y2="140" stroke="#0f172a" stroke-width="1.6" marker-end="url(#arr-dark)"/>

  <!-- Certior gate (center) -->
  <rect x="310" y="50" width="340" height="180" rx="10" fill="#0f172a"/>
  <text x="480" y="78" text-anchor="middle" font-size="10" fill="#94a3b8" font-family="ui-monospace,monospace" letter-spacing="1.2">CERTIOR GATE / Z3 ENFORCES, LEAN PROVES</text>

  <text x="335" y="112" font-size="12" fill="#f8efe3" font-family="ui-sans-serif,system-ui">•</text>
  <text x="355" y="112" font-size="13" font-weight="600" fill="#f8efe3" font-family="ui-sans-serif,system-ui">Capability subset</text>
  <text x="355" y="128" font-size="10.5" fill="#94a3b8" font-family="ui-sans-serif,system-ui">child can never escalate beyond parent</text>

  <text x="335" y="154" font-size="12" fill="#f8efe3" font-family="ui-sans-serif,system-ui">•</text>
  <text x="355" y="154" font-size="13" font-weight="600" fill="#f8efe3" font-family="ui-sans-serif,system-ui">Content policy</text>
  <text x="355" y="170" font-size="10.5" fill="#94a3b8" font-family="ui-sans-serif,system-ui">HIPAA, SOX, attorney-client</text>

  <text x="335" y="196" font-size="12" fill="#f8efe3" font-family="ui-sans-serif,system-ui">•</text>
  <text x="355" y="196" font-size="13" font-weight="600" fill="#f8efe3" font-family="ui-sans-serif,system-ui">Budget ceiling</text>
  <text x="355" y="212" font-size="10.5" fill="#94a3b8" font-family="ui-sans-serif,system-ui">runaway delegations stop themselves</text>

  <!-- split arrows -->
  <line x1="655" y1="105" x2="715" y2="80" stroke="#10b981" stroke-width="1.6" marker-end="url(#arr-green)"/>
  <line x1="655" y1="175" x2="715" y2="200" stroke="#dc2626" stroke-width="1.6" marker-end="url(#arr-red)"/>

  <!-- Allowed card (top-right) -->
  <rect x="720" y="30" width="220" height="90" rx="10" fill="#fff" stroke="#10b981" stroke-width="1.4"/>
  <text x="830" y="54" text-anchor="middle" font-size="10" fill="#10b981" font-family="ui-monospace,monospace" font-weight="700" letter-spacing="1.2">✓ ALLOWED</text>
  <text x="830" y="76" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">signed receipt</text>
  <text x="830" y="93" text-anchor="middle" font-size="10" fill="#64748b" font-family="ui-monospace,monospace">policy = 4542ff75</text>
  <text x="830" y="108" text-anchor="middle" font-size="10" fill="#64748b">verifiable offline</text>

  <!-- Blocked card (bottom-right) -->
  <rect x="720" y="160" width="220" height="90" rx="10" fill="#fff" stroke="#dc2626" stroke-width="1.4"/>
  <text x="830" y="184" text-anchor="middle" font-size="10" fill="#dc2626" font-family="ui-monospace,monospace" font-weight="700" letter-spacing="1.2">✗ BLOCKED</text>
  <text x="830" y="206" text-anchor="middle" font-size="13" font-weight="600" fill="#0f172a">precise reason</text>
  <text x="830" y="223" text-anchor="middle" font-size="10" fill="#64748b" font-family="ui-monospace,monospace">CertiorBlocked</text>
  <text x="830" y="238" text-anchor="middle" font-size="10" fill="#64748b">with violation detail</text>
</svg>
