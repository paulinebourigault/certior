<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 480" width="720" height="480" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif">
  <!-- Background -->
  <rect width="720" height="480" fill="#0d1117" rx="12"/>

  <!-- Title -->
  <text x="360" y="40" text-anchor="middle" fill="#e6edf3" font-size="15" font-weight="600" letter-spacing="0.5">Multi-Agent Delegation - Formal Proof at Every Handoff</text>
  <text x="360" y="60" text-anchor="middle" fill="#8b949e" font-size="11">Agent B's permissions are a mathematically proven subset of Agent A's. Every arrow is a Lean certificate.</text>

  <!-- ═══ HAPPY PATH (TOP ROW) ═══ -->
  <text x="56" y="96" fill="#3fb950" font-size="10" font-weight="600" letter-spacing="1">VALID DELEGATION CHAIN</text>

  <!-- Agent A (Orchestrator) -->
  <rect x="36" y="108" width="140" height="84" rx="10" fill="#0e1f3d" stroke="#1f6feb" stroke-width="2"/>
  <text x="106" y="130" text-anchor="middle" fill="#8b949e" font-size="9" letter-spacing="0.5">AGENT A</text>
  <text x="106" y="148" text-anchor="middle" fill="#e6edf3" font-size="12" font-weight="700">Orchestrator</text>
  <text x="106" y="165" text-anchor="middle" fill="#58a6ff" font-size="9">Perms: read_db</text>
  <text x="106" y="179" text-anchor="middle" fill="#58a6ff" font-size="9">write_log, execute</text>

  <!-- Arrow A→B (valid) -->
  <line x1="176" y1="150" x2="242" y2="150" stroke="#238636" stroke-width="2"/>
  <polygon points="242,150 232,145 232,155" fill="#238636"/>
  <!-- Proof badge on arrow -->
  <rect x="181" y="134" width="56" height="18" rx="9" fill="#0f2a1e" stroke="#238636" stroke-width="1"/>
  <text x="209" y="147" text-anchor="middle" fill="#3fb950" font-size="8.5" font-weight="600">✓ Lean proof</text>

  <!-- Agent B (Reviewer) -->
  <rect x="242" y="108" width="140" height="84" rx="10" fill="#0e1f3d" stroke="#1f6feb" stroke-width="2"/>
  <text x="312" y="130" text-anchor="middle" fill="#8b949e" font-size="9" letter-spacing="0.5">AGENT B</text>
  <text x="312" y="148" text-anchor="middle" fill="#e6edf3" font-size="12" font-weight="700">Reviewer</text>
  <text x="312" y="165" text-anchor="middle" fill="#58a6ff" font-size="9">Perms: read_db</text>
  <text x="312" y="179" text-anchor="middle" fill="#8b949e" font-size="9">(subset of A ✓)</text>

  <!-- Arrow B→C (valid) -->
  <line x1="382" y1="150" x2="448" y2="150" stroke="#238636" stroke-width="2"/>
  <polygon points="448,150 438,145 438,155" fill="#238636"/>
  <!-- Proof badge on arrow -->
  <rect x="387" y="134" width="56" height="18" rx="9" fill="#0f2a1e" stroke="#238636" stroke-width="1"/>
  <text x="415" y="147" text-anchor="middle" fill="#3fb950" font-size="8.5" font-weight="600">✓ Lean proof</text>

  <!-- Agent C (Sub-task) -->
  <rect x="448" y="108" width="140" height="84" rx="10" fill="#0e1f3d" stroke="#1f6feb" stroke-width="2"/>
  <text x="518" y="130" text-anchor="middle" fill="#8b949e" font-size="9" letter-spacing="0.5">AGENT C</text>
  <text x="518" y="148" text-anchor="middle" fill="#e6edf3" font-size="12" font-weight="700">Sub-task</text>
  <text x="518" y="165" text-anchor="middle" fill="#58a6ff" font-size="9">Perms: read_db</text>
  <text x="518" y="179" text-anchor="middle" fill="#8b949e" font-size="9">(subset of B ✓)</text>

  <!-- Output: certificate -->
  <line x1="588" y1="150" x2="638" y2="150" stroke="#238636" stroke-width="2"/>
  <polygon points="638,150 628,145 628,155" fill="#238636"/>
  <rect x="638" y="112" width="66" height="80" rx="8" fill="#0f2a1e" stroke="#238636" stroke-width="1.5"/>
  <text x="671" y="130" text-anchor="middle" fill="#3fb950" font-size="9" font-weight="700">AUDIT</text>
  <text x="671" y="144" text-anchor="middle" fill="#3fb950" font-size="9" font-weight="700">CERT</text>
  <text x="671" y="162" text-anchor="middle" fill="#8b949e" font-size="8">Z3 proof</text>
  <text x="671" y="174" text-anchor="middle" fill="#8b949e" font-size="8">Lean cert</text>
  <text x="671" y="186" text-anchor="middle" fill="#8b949e" font-size="8">PDF export</text>

  <!-- ═══ FAILURE PATH (MIDDLE ROW) ═══ -->
  <text x="56" y="226" fill="#f85149" font-size="10" font-weight="600" letter-spacing="1">PRIVILEGE ESCALATION - BLOCKED</text>

  <!-- Agent A' -->
  <rect x="36" y="240" width="140" height="84" rx="10" fill="#1a0e0e" stroke="#f85149" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="106" y="262" text-anchor="middle" fill="#8b949e" font-size="9" letter-spacing="0.5">AGENT A</text>
  <text x="106" y="280" text-anchor="middle" fill="#e6edf3" font-size="12" font-weight="700">Orchestrator</text>
  <text x="106" y="297" text-anchor="middle" fill="#58a6ff" font-size="9">Perms: read_db</text>
  <text x="106" y="311" text-anchor="middle" fill="#58a6ff" font-size="9">write_log</text>

  <!-- Arrow (blocked) -->
  <line x1="176" y1="282" x2="242" y2="282" stroke="#f85149" stroke-width="2" stroke-dasharray="5,3"/>
  <!-- Red X -->
  <circle cx="209" cy="263" r="12" fill="#1a0e0e" stroke="#f85149" stroke-width="1.5"/>
  <line x1="203" y1="257" x2="215" y2="269" stroke="#f85149" stroke-width="2.5"/>
  <line x1="215" y1="257" x2="203" y2="269" stroke="#f85149" stroke-width="2.5"/>

  <!-- Agent B' (attempting escalation) -->
  <rect x="242" y="240" width="140" height="84" rx="10" fill="#1a0e0e" stroke="#f85149" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="312" y="262" text-anchor="middle" fill="#8b949e" font-size="9" letter-spacing="0.5">AGENT B (malicious)</text>
  <text x="312" y="280" text-anchor="middle" fill="#e6edf3" font-size="12" font-weight="700">Requests</text>
  <text x="312" y="296" text-anchor="middle" fill="#f85149" font-size="9" font-weight="600">write_prod_db ← NEW</text>
  <text x="312" y="311" text-anchor="middle" fill="#f85149" font-size="9">(not in A's grant)</text>

  <!-- Rejection box -->
  <rect x="422" y="250" width="180" height="64" rx="8" fill="#160b0b" stroke="#f85149" stroke-width="1.5"/>
  <text x="512" y="272" text-anchor="middle" fill="#f85149" font-size="11" font-weight="700">CERTIOR REJECTS</text>
  <text x="512" y="289" text-anchor="middle" fill="#8b949e" font-size="10">write_prod_db ⊄ {read_db,</text>
  <text x="512" y="304" text-anchor="middle" fill="#8b949e" font-size="10">write_log} - lattice violation</text>
  <!-- Arrow from B to rejection -->
  <line x1="382" y1="282" x2="422" y2="282" stroke="#f85149" stroke-width="1.5"/>
  <polygon points="422,282 412,277 412,287" fill="#f85149"/>

  <!-- ═══ WITHOUT CERTIOR (BOTTOM ROW) ═══ -->
  <text x="56" y="364" fill="#6e7681" font-size="10" font-weight="600" letter-spacing="1">WITHOUT CERTIOR - UNDETECTED ESCALATION</text>

  <!-- Ghost A -->
  <rect x="36" y="376" width="140" height="64" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="106" y="401" text-anchor="middle" fill="#6e7681" font-size="12" font-weight="600">Agent A</text>
  <text x="106" y="418" text-anchor="middle" fill="#484f58" font-size="9">grants permissions</text>
  <text x="106" y="432" text-anchor="middle" fill="#484f58" font-size="9">via JSON string</text>

  <!-- Arrow (passes through) -->
  <line x1="176" y1="408" x2="260" y2="408" stroke="#6e7681" stroke-width="1.5"/>
  <polygon points="260,408 250,403 250,413" fill="#6e7681"/>

  <!-- Ghost B -->
  <rect x="260" y="376" width="140" height="64" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="330" y="401" text-anchor="middle" fill="#6e7681" font-size="12" font-weight="600">Agent B</text>
  <text x="330" y="418" text-anchor="middle" fill="#f85149" font-size="9">escalates silently</text>
  <text x="330" y="432" text-anchor="middle" fill="#484f58" font-size="9">(no one checks)</text>

  <!-- Arrow (passes through) -->
  <line x1="400" y1="408" x2="484" y2="408" stroke="#6e7681" stroke-width="1.5"/>
  <polygon points="484,408 474,403 474,413" fill="#6e7681"/>

  <!-- Production DB with breach indicator -->
  <rect x="484" y="376" width="140" height="64" rx="10" fill="#1a0e0e" stroke="#f85149" stroke-width="2"/>
  <text x="554" y="401" text-anchor="middle" fill="#f85149" font-size="12" font-weight="700">prod_db</text>
  <text x="554" y="418" text-anchor="middle" fill="#f85149" font-size="11" font-weight="600">DATA BREACH</text>
  <text x="554" y="432" text-anchor="middle" fill="#8b949e" font-size="9">HIPAA/SOX violation</text>

  <!-- Footer -->
  <text x="360" y="464" text-anchor="middle" fill="#484f58" font-size="10">PostgreSQL stores every delegation as an immutable audit record. The React Flow DAG visualises the chain live.</text>

</svg>
